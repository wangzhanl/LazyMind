# Model catalog — source of truth for default_model_providers and default_models.
# Loaded at startup by modelprovider.SeedModelCatalog(); replaces the seed SQL INSERT statements.
#
# Top-level keys must end with "_providers"; the prefix becomes the category:
#   model_providers  → category: model
#   ocr_providers    → category: ocr
#   search_providers → category: search
#
# capabilities flags (comma-separated in DB):
#   multi_group      — user may create multiple groups under one provider
#   custom_base_url  — user may change base_url
#   has_models       — group has a model list (seeded from default_models)
#   api_key_required — api_key must not be empty
#
# model type values align with runtime_models.yaml role keys:
#   llm, evo_llm, vlm, embed_main, embed_image, reranker,
#   tts, stt, text2image, image_editing
#
# base_url rules:
#   - Provider-level base_url must end with '/'.
#   - Model-level base_url is not supported; all models inherit the provider's base_url.

model_providers:
  capabilities: [multi_group, custom_base_url, has_models]
  suppliers:
    - name: Claude
      description: |
        Anthropic 打造的顶尖 AI 基座，具备强大的自适应思考能力与原生视觉支持，在代码开发与复杂 Agent 任务上业界领先。

        获取 API Key：
        https://console.anthropic.com/settings/keys

        申请教程：

        1. 访问 Anthropic Console，使用海外邮箱或 Google 账号直接注册。

        2. 登录后（需验证海外手机号并绑定外币信用卡结算），进入左侧菜单的 Settings → API Keys 页面。

        3. 点击 Create Key，输入辨识名称后即可生成，请务必当场复制并妥善保存（关闭弹窗后无法再次查看完整 Key）。
      base_url: "https://api.anthropic.com/v1/"
      models:
        - name: claude-haiku-4-5
          type: vlm
        - name: claude-opus-4-7
          type: vlm
        - name: claude-sonnet-4-6
          type: vlm

