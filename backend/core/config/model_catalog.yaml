ocr_providers:
  capabilities: [custom_base_url]
  suppliers:
    - name: MinerU
      description: |
        MinerU 是面向科研与企业的高精度文档解析服务，支持 PDF、Word、PPT 等多种格式，可精准提取文字、表格、公式与图片。

        获取 API Key：
        https://mineru.net/apiManage/token

        申请教程：

        1. 访问 MinerU 官网并注册账号。

        2. 登录后进入控制台 → API 管理页面，点击"创建 Token"。

        3. 复制生成的 Token 并妥善保存。
      base_url: "https://mineru.net/api/v4/"
    - name: PaddleOCR
      description: |
        百度飞桨开源 OCR 引擎，支持中英文及多语言识别，可私有化部署，适合对数据安全有要求的场景。

        获取 API Key：
        https://aistudio.baidu.com/paddleocr

        申请教程：

        1. 访问 PaddleOCR 官网并注册账号。

        2. 登录后进入控制台 → API 管理页面，点击"创建 Token"。

        3. 复制生成的 Token 并妥善保存。
      base_url: "https://paddleocr.aistudio-app.com/api/v2/ocr/jobs"

search_providers:
  capabilities: []
  suppliers:
    - name: Tavily
      description: |
        专为 AI Agent 设计的搜索引擎，返回结构化摘要，减少噪音，适合 RAG 与 Agent 工作流。

        获取 API Key：
        https://app.tavily.com/home

        申请教程：

        1. 访问 Tavily 官网并注册账号。

        2. 登录后在 Dashboard 页面即可看到 API Key，点击复制。
      base_url: "https://api.tavily.com/"
    - name: Bing
      description: |
        微软必应搜索 API，覆盖全球网页、新闻、图片等多类型内容，适合需要实时互联网信息的场景。

        获取 API Key：
        https://portal.azure.com/#create/Microsoft.BingSearch

        申请教程：

        1. 登录 Azure 门户，搜索"Bing Search"并创建资源。

        2. 创建完成后进入资源页面，在"密钥和终结点"中复制 Key1 或 Key2。
      base_url: "https://api.bing.microsoft.com/"
