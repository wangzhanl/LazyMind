        2. 登录后进入左侧导航栏的 API Keys 页面，点击"创建 API Key"。

        3. 为 Key 命名后点击创建，系统会生成一串密钥，请复制并妥善保存至你的代码配置中。
      base_url: "https://api.deepseek.com/"
