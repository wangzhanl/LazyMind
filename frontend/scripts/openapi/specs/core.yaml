    /api/core/model_providers:
        get:
            description: Per-user model provider list. Missing catalog rows are synced from default_model_providers on each request. Query parameter category filters by provider category (default model when category and exclude_category are both omitted). Query parameter exclude_category excludes a category (e.g. exclude_category=model returns ocr and search providers). Query parameter keyword filters by provider name case-insensitively.
            parameters:
                - in: query
                  name: category
                  required: false
                  schema:
                    type: string
                - in: query
                  name: exclude_category
                  required: false
                  schema:
                    type: string
                - in: query
                  name: keyword
                  required: false
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/listUserModelProvidersOpenAPIResponse'
                    description: User model provider list
            summary: List user model providers
            tags:
                - model_providers
    /api/core/model_providers/{model_provider_id}/groups:
        get:
            description: Lists non-deleted groups for the user model provider. model_provider_id is the id from GET /model_providers. Each item includes api_key.
            parameters:
                - in: path
                  name: model_provider_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/listModelProviderGroupsOpenAPIResponse'
                    description: Group list
            summary: List model provider connection groups
            tags:
                - model_providers
        post:
            description: Creates a group (name, base_url, optional api_key) under the given user model provider. OCR cloud services validate the submitted API key against the provider API before saving. The api_key is not returned in the response body.
            parameters:
                - in: path
                  name: model_provider_id
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/createModelProviderGroupOpenAPIRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/createModelProviderGroupOpenAPIResponse'
                    description: Created group
            summary: Create model provider connection group
            tags:
                - model_providers
    /api/core/model_providers/{model_provider_id}/groups/{group_id}:
        delete:
            description: Soft-deletes the group and its user_model_provider_group_models rows. The current user identity is injected by the auth gateway from the token.
            parameters:
                - in: path
                  name: model_provider_id
                  required: true
                  schema:
                    type: string
                - in: path
                  name: group_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/deleteModelProviderGroupOpenAPIResponse'
                    description: Deleted group
            summary: Delete model provider connection group
            tags:
                - model_providers
        patch:
            description: Updates name, base_url, and optionally api_key for a group. OCR cloud services validate the effective API key against the provider API before saving. Omit api_key or send an empty string to keep the existing API key. The api_key is not returned in the response body.
            parameters:
                - in: path
                  name: model_provider_id
                  required: true
                  schema:
                    type: string
                - in: path
                  name: group_id
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/updateModelProviderGroupOpenAPIRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/createModelProviderGroupOpenAPIResponse'
                    description: Updated group
            summary: Update model provider connection group
            tags:
                - model_providers
    /api/core/model_providers/{model_provider_id}/groups/{group_id}/keys:
        delete:
            parameters:
                - in: path
                  name: model_provider_id
                  required: true
                  schema:
                    type: string
                - in: path
                  name: group_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
            summary: DELETE /model_providers/{model_provider_id}/groups/{group_id}/keys
        post:
            parameters:
