info:
    description: LazyMind Go backend core API - proxies to algorithm services. text Kong text /api/core。
    title: Backend Core API
    version: 0.1.0
openapi: 3.0.3
paths:
    /api/core/add_files_to_group:
        post:
            description: Proxies to parsing service. Multipart form with files.
            parameters:
                - in: query
                  name: group_name
                  required: true
                  schema:
                    type: string
                - in: query
                  name: override
                  schema:
                    default: false
                    type: boolean
            requestBody:
                content:
                    multipart/form-data:
                        schema:
                            properties:
                                files:
                                    items:
                                        format: binary
                                        type: string
                                    type: array
                            type: object
            responses:
                "200":
                    description: Returns file ids
            summary: Upload files and add to knowledge base group
    /api/core/admin:
        get:
            responses:
                "200":
                    description: OK
            summary: Admin (requires document.write)
    /api/core/agent/diffs/{apply_id}/{filename:.*}:
        get:
            parameters:
                - in: path
                  name: apply_id
                  required: true
                  schema:
                    type: string
                - in: path
                  name: filename:.*
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
            summary: GET /agent/diffs/{apply_id}/{filename:.*}
    /api/core/agent/files:content:
        post:
            description: Read a local agent result file by path and return its text content. Use JSON body to avoid URL path escaping issues.
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/agentFileContentOpenAPIRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/agentFileContentOpenAPIResponse'
                    description: Agent result file content
            summary: Read agent result file content
            tags:
                - agent
    /api/core/agent/reports/{report_id}:content:
        get:
            parameters:
                - in: path
                  name: report_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
            summary: GET /agent/reports/{report_id}:content
    /api/core/agent/threads:
        get:
            description: List the current user's agent threads. Use thread_id from this response to load thread details or history.
            parameters:
                - in: query
                  name: page_size
                  required: false
                  schema:
                    type: integer
                - in: query
                  name: page_token
                  required: false
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/agentThreadListOpenAPIResponse'
                    description: Agent thread list
            summary: List agent threads
            tags:
                - agent
        post:
            responses:
                "200":
                    description: OK
            summary: POST /agent/threads
    /api/core/agent/threads/{thread_id}:
        get:
            parameters:
                - in: path
                  name: thread_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
            summary: GET /agent/threads/{thread_id}
    /api/core/agent/threads/{thread_id}/artifacts/{artifact_id}:
        get:
            parameters:
                - in: path
                  name: thread_id
                  required: true
                  schema:
                    type: string
                - in: path
                  name: artifact_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
            summary: GET /agent/threads/{thread_id}/artifacts/{artifact_id}
    /api/core/agent/threads/{thread_id}/events/{step_id}:
        get:
            parameters:
                - in: path
                  name: thread_id
                  required: true
                  schema:
                    type: string
                - in: path
                  name: step_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
            summary: GET /agent/threads/{thread_id}/events/{step_id}
    /api/core/agent/threads/{thread_id}/flow-status:
        get:
            parameters:
                - in: path
                  name: thread_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
            summary: GET /agent/threads/{thread_id}/flow-status
    /api/core/agent/threads/{thread_id}/history:
        get:
            parameters:
                - in: path
                  name: thread_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
            summary: GET /agent/threads/{thread_id}/history
    /api/core/agent/threads/{thread_id}/records:
        get:
            parameters:
                - in: path
                  name: thread_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
            summary: GET /agent/threads/{thread_id}/records
    /api/core/agent/threads/{thread_id}/results/abtests:
        get:
            parameters:
                - in: path
                  name: thread_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
            summary: GET /agent/threads/{thread_id}/results/abtests
    /api/core/agent/threads/{thread_id}/results/abtests/{abtest_id}/case-details:
        get:
            description: Returns filtered, paginated case details for an ABTest result. keyword matches case text and identifiers; outcome matches exactly.
            parameters:
                - in: path
                  name: thread_id
                  required: true
                  schema:
                    type: string
                - in: path
                  name: abtest_id
                  required: true
                  schema:
                    type: string
                - in: query
                  name: page_token
                  required: false
                  schema:
                    type: string
                - in: query
                  name: page_size
                  required: false
                  schema:
                    type: integer
                - in: query
                  name: keyword
                  required: false
                  schema:
                    type: string
                - in: query
                  name: outcome
                  required: false
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/agentABTestCaseDetailListOpenAPIResponse'
                    description: ABTest case detail list
            summary: GET /agent/threads/{thread_id}/results/abtests/{abtest_id}/case-details
            tags:
                - agent
    /api/core/agent/threads/{thread_id}/results/analysis-reports:
        get:
            parameters:
                - in: path
                  name: thread_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
            summary: GET /agent/threads/{thread_id}/results/analysis-reports
    /api/core/agent/threads/{thread_id}/results/datasets:
        get:
            parameters:
                - in: path
                  name: thread_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
            summary: GET /agent/threads/{thread_id}/results/datasets
    /api/core/agent/threads/{thread_id}/results/diffs:
        get:
            parameters:
                - in: path
                  name: thread_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
            summary: GET /agent/threads/{thread_id}/results/diffs
    /api/core/agent/threads/{thread_id}/results/eval-reports:
        get:
            description: Returns eval report artifact rows from Evo, with core-added report_id, bad_case_count, and trace_coverage when available. Existing report fields remain under data except bad_cases, which is served by the dedicated bad-case list endpoint.
            parameters:
                - in: path
                  name: thread_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: '#/components/schemas/agentEvalReportResultOpenAPIResponse'
                                type: array
                    description: Eval report result rows
            summary: GET /agent/threads/{thread_id}/results/eval-reports
            tags:
                - agent
    /api/core/agent/threads/{thread_id}/results/eval-reports/{report_id}/bad-cases:
        get:
            description: Returns filtered, paginated bad cases for an eval report. keyword matches defect and reason text; failure_type matches exactly.
            parameters:
                - in: path
                  name: thread_id
                  required: true
                  schema:
                    type: string
                - in: path
                  name: report_id
                  required: true
                  schema:
                    type: string
                - in: query
                  name: page_token
                  required: false
                  schema:
                    type: string
                - in: query
                  name: page_size
                  required: false
                  schema:
                    type: integer
                - in: query
                  name: keyword
                  required: false
                  schema:
                    type: string
                - in: query
                  name: failure_type
                  required: false
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/agentEvalReportBadCaseListOpenAPIResponse'
                    description: Eval report bad case list
            summary: GET /agent/threads/{thread_id}/results/eval-reports/{report_id}/bad-cases
            tags:
                - agent
    /api/core/agent/threads/{thread_id}/results/traces-compare:
        get:
            description: Compare two trace details in a thread. Query parameters a and b are trace IDs.
            parameters:
                - in: path
                  name: thread_id
                  required: true
                  schema:
                    type: string
                - in: query
                  name: a
                  required: true
                  schema:
                    type: string
                - in: query
                  name: b
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/agentTraceCompareOpenAPIResponse'
                    description: Agent trace comparison
            summary: Compare agent traces
            tags:
                - agent
    /api/core/agent/threads/{thread_id}/results/traces/{trace_id}:
        get:
            description: Get one trace detail for a thread owned by the current user.
            parameters:
                - in: path
                  name: thread_id
                  required: true
                  schema:
                    type: string
                - in: path
                  name: trace_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/agentTraceDetailOpenAPIResponse'
                    description: Agent trace detail
            summary: Get agent trace detail
            tags:
