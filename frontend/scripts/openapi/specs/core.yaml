        delete:
            description: Deletes the Evo thread when present and removes Core's local thread index and active-thread row.
            parameters:
                - in: path
                  name: thread_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                additionalProperties: true
                                type: object
                    description: Deleted agent thread
            summary: Delete agent thread
            tags:
                - agent
        get:
            description: Returns the current user's local thread index entry with status refreshed from Evo when available.
            parameters:
                - in: path
                  name: thread_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                additionalProperties: true
                                type: object
                    description: Agent thread
            summary: Get agent thread
            tags:
                - agent
