                - in: query
                  name: page_size
                  required: false
                  schema:
                    type: integer
                - in: query
                  name: page_token
                  required: false
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                additionalProperties: true
                                type: object
                    description: Evo candidate list
            summary: List Evo candidates
            tags:
                - agent
    /api/core/agent/candidates/{candidate_id:.*}:
        get:
            description: Proxies Evo GET /candidates/{candidate_id} after validating the thread_id prefix belongs to the current user.
            parameters:
                - in: path
                  name: candidate_id:.*
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                additionalProperties: true
                                type: object
                    description: Evo candidate
            summary: Get Evo candidate
            tags:
                - agent
    /api/core/agent/router/ab-strategy:
        get:
            description: Proxies Evo GET /router/ab-strategy.
