    /api/core/remote-fs/content:
        get:
            description: 'Reads package content using task_id semantics: review_ sees existing draft, org_ and editor session ids see publish unless they own the current draft.'
            parameters:
                - description: Required. Target user id used to resolve skills owned by the user.
                  in: query
                  name: user_id
                  required: true
                  schema:
                    type: string
                - description: 'RemoteFS package path: skills/<category>/<skill_name>[/rel_path].'
                  in: query
                  name: path
                  required: true
                  schema:
                    type: string
                - description: Required package content task id. Prefix review_ reads/writes existing draft, org_ is skill organization, other values are skill_editor session ids.
                  in: query
                  name: task_id
                  required: true
                  schema:
                    type: string
                - description: Optional content encoding for GET /remote-fs/content.
                  in: query
                  name: encoding,omitempty
                  required: false
                  schema:
                    enum:
                        - raw
                        - base64
                    type: string
            responses:
                "200":
                    content:
                        application/octet-stream:
                            schema:
                                format: binary
                                type: string
                    description: Remote filesystem raw content
            summary: Read remote skill filesystem content
            tags:
