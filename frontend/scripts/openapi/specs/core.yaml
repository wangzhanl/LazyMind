                            schema:
                                $ref: '#/components/schemas/listModelProviderGroupModelsOpenAPIResponse'
                    description: Group models list
            summary: List models under a connection group
            tags:
                - model_providers
        post:
            description: Creates a user_model_provider_group_models row with is_default false (custom model name and model_type). Name must be unique within the group among active rows. provider_name and base_url are taken from the user provider and group. Response group_name is user_model_provider_groups.name (not stored on the model row).
            parameters:
                - in: path
                  name: model_provider_id
                  required: true
                  schema:
                    type: string
                - in: path
                  name: group_id
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/addModelProviderGroupModelOpenAPIRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/addModelProviderGroupModelOpenAPIResponse'
                    description: Created group model
            summary: Add custom model under a connection group
            tags:
                - model_providers
