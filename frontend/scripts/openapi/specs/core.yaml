                - in: query
                  name: router_chat_url
                  required: false
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                additionalProperties: true
                                type: object
                    description: Evo router AB strategy
            summary: Get Evo router AB strategy
            tags:
                - agent
        put:
            description: Proxies Evo PUT /router/ab-strategy.
            requestBody:
                content:
                    application/json:
                        schema:
                            additionalProperties: true
                            type: object
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                additionalProperties: true
                                type: object
                    description: Evo router AB strategy
            summary: Update Evo router AB strategy
