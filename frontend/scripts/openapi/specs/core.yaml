        delete:
            description: Soft-deletes one user_model_provider_group_models row. The current user identity is injected by the auth gateway from the token.
            parameters:
                - in: path
                  name: model_provider_id
                  required: true
                  schema:
                    type: string
                - in: path
                  name: group_id
                  required: true
                  schema:
                    type: string
                - in: path
                  name: model_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/deleteModelProviderGroupModelOpenAPIResponse'
