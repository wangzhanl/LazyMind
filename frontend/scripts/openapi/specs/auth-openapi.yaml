openapi: 3.1.0
info:
  title: Auth Service
  description: LazyMind authentication and authorization service (login, registration,
    token, user/role/group management)
  version: 1.0.0
paths:
  /api/authservice/auth/health:
    get:
      tags:
      - auth
      summary: Health
      operationId: health_api_authservice_auth_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/authservice/auth/register:
    post:
      tags:
      - auth
      summary: Register
      operationId: register_api_authservice_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterBody'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/authservice/auth/login:
