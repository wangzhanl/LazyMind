      - HTTPBearer: []
  /api/authservice/auth/authorize:
    post:
      tags:
      - authorization
      summary: Authorize
      description: "Authorization: called by gateway (Kong); determine allow/deny\
        \ based on request method, path, and user Bearer token\n  1. If no required\
        \ permission is configured for the API, allow directly;\n  2. Otherwise verify\
        \ user role and permission groups; allow if admin or if any required permission\
        \ is present;\n  3. Otherwise return 403."
