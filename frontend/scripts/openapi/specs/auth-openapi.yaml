        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/authservice/auth/validate:
    post:
      tags:
      - auth
      summary: Validate
      operationId: validate_api_authservice_auth_validate_post
