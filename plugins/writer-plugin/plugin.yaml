id: writer-plugin
name: AI Writer
description: >
  Compose structured long-form writing, including articles, reports, technical
  documents, creative stories, fiction, short stories, and novel-style drafts.
  The workflow parses the writing intent and scope, generates
  an outline, plan per-chapter writing instructions, draft the full text, revise
  the draft on user request, review the draft and surface revision feedback,
  then produces the final document. Revision decisions are represented by
  material-based choice routes; retry and rewind are runtime commands.

when_to_use: >
  Use this plugin only when the user explicitly requests it, or when the user
  requests a complete, complex writing deliverable that depends materially on
  existing knowledge or source materials and requires a multi-stage workflow
  such as context building, outlining, section planning, drafting, and review.
  Do not invoke it for everyday conversation, simple document generation,
  short-form writing, rewriting, summarization, translation, brainstorming,
  outlining alone, or tasks that can be answered directly. This is a fallback
  writing plugin: if a more specific skill or plugin matches the task, such as
  proposal, academic, or product-document writing, use that instead.

tool_scripts:
  - path: scripts/tools.py
    functions:
      - writer_build_writing_task
      - writer_profile_resources
      - writer_create_writing_context
      - writer_generate_outline
      - writer_generate_section_instructions
      - writer_generate_draft_section
      - writer_assemble_draft_document
      - writer_update_writing_context
      - writer_check_consistency
      - writer_generate_writing_output
      - writer_build_revise_task
      - writer_generate_patch_set
      - writer_validate_patch_set
      - writer_apply_patch

steps:
  - id: build_context
  - id: generate_outline
  - id: plan_sections
  - id: generate_draft
  - id: decide_draft_action
  - id: generate_patch
  - id: decide_patch_action
  - id: apply_patch
  - id: review_document
  - id: finalize_report

slots:
  - id: writing_task
    label: Writing Task
    type: text
    cardinality: single
  - id: resource_profiles
    label: Resource Profiles
    type: text
    cardinality: single
  - id: writing_context
    label: Writing Context
    type: text
    cardinality: single
    summary_max_chars: 600
  - id: writing_context_after_outline
    label: Writing Context After Outline
    type: text
    cardinality: single
    summary_max_chars: 600
  - id: writing_context_after_draft
    label: Writing Context After Draft
    type: text
    cardinality: single
    summary_max_chars: 600
  - id: outline
    label: Outline
    type: text
    cardinality: single
  - id: section_instructions
    label: Section Instructions
    type: text
    cardinality: single
  - id: draft_sections
    label: Draft Sections
    type: text
    cardinality: list
    ordered: true
  - id: draft_document
    label: Full Draft
    type: text
    cardinality: single
  - id: revise_task
    label: Revise Task
    type: text
    cardinality: single
  - id: doc_ir
    label: Doc IR
    type: text
    cardinality: single
  - id: patch_set
    label: Patch Set
    type: text
    cardinality: single
  - id: patch_set_review
    label: Patch Set Review
    type: text
    cardinality: single
  - id: patch_set_review_summary
    label: Patch Set Review Summary
    type: text
    cardinality: single
  - id: patch_result
    label: Patch Result
    type: text
    cardinality: single
  - id: revision_requested
    label: Revision Requested
    type: text
    cardinality: single
  - id: patch_accepted
    label: Patch Accepted
    type: text
    cardinality: single
  - id: revised_draft_document
    label: Revised Draft
    type: text
    cardinality: single
  - id: writing_context_after_revision
    label: Writing Context After Revision
    type: text
    cardinality: single
  - id: review_report
    label: Review Report
    type: text
    cardinality: single
  - id: review_summary
    label: Review Summary
    type: text
    cardinality: single
  - id: writing_output
    label: Final Report
    type: text
    cardinality: single
  - id: writing_output_md
    label: Final Report (Markdown)
    type: file
    cardinality: single

ui:
  tabs:
    - id: context
      step_id: build_context
      label: Context
      layout: list
      slots:
        - id: writing_task
        - id: resource_profiles
        - id: writing_context

    - id: outline
      step_id: generate_outline
      label: Outline
      layout: list
      slots:
        - id: outline
        - id: writing_context_after_outline

    - id: plan_sections
      step_id: plan_sections
      label: Plan Sections
      layout: list
      slots:
        - id: section_instructions

    - id: draft
      step_id: generate_draft
      label: Draft
      layout: list
      slots:
        - id: draft_sections
        - id: draft_document
        - id: writing_context_after_draft

    - id: generate_patch
      step_id: generate_patch
      label: Generate Patch
      layout: list
      slots:
        - id: revise_task
        - id: patch_set
        - id: patch_set_review
        - id: patch_set_review_summary

    - id: apply_patch
      step_id: apply_patch
      label: Apply Patch
      layout: list
      slots:
        - id: patch_result
        - id: revised_draft_document
        - id: writing_context_after_revision

    - id: review
      step_id: review_document
      label: Review
      layout: list
      slots:
        - id: review_report
        - id: review_summary

    - id: result
      step_id: finalize_report
      label: Final Report
      layout: list
      slots:
        - id: writing_output
        - id: writing_output_md

