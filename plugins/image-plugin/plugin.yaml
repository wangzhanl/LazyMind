id: image-plugin
name: AI Image Generation
description: >
  Generate, find, or edit images from natural language descriptions.
  The workflow is dynamic: ChatAgent routes through analyze_subject,
  optimize_prompt, generate_image, collect_materials, and enhance_image
  based on user intent (CREATE_NEW vs FIND_AND_EDIT vs EDIT_UPLOAD).
  CREATE_NEW and KB_STYLE skip material collection and generate directly after
  prompt optimization. collect_materials gathers reference images for
  REFERENCE_GENERATE (then optimize → generate) or prepares a raw source image
  for FIND_AND_EDIT / EDIT_UPLOAD editing workflows.

when_to_use: >
  Call this tool whenever the user wants to generate, draw, create, paint,
  edit, or find-and-modify an image as the PRIMARY and DIRECT intent of their
  request — including "画一张图", "帮我生成图片", "启动绘图插件", "打开图片生成插件",
  "找一张XX的照片然后加上YY", "在这张图上加水印", "根据知识库中的风格画图", or "draw a cat".
  When the user explicitly says to start/launch the image or drawing plugin, you MUST
  call trigger_image_plugin immediately — do not reply with text only or call
  image_generator/image_editor before the plugin is started.
  When the user has selected a knowledge base, use KB_STYLE workflow;
  the analyze_subject step calls kb_search inside the plugin SubAgent.
  Do NOT trigger if image generation is merely one sub-step within a larger
  multi-step task (e.g. "write a report and add an image"). Do NOT trigger
  for text content, quizzes, reports, summaries, or any non-visual task.

tool_scripts:
  - path: scripts/tools.py
    functions:
      - image_search_tool
      - validate_image_ref

steps:
  - id: analyze_subject
    label: Analyze Subject

  - id: collect_materials
    label: Collect Materials

  - id: optimize_prompt
    label: Optimize Prompt

  - id: generate_image
    label: Generate Image

  - id: enhance_image
    label: Enhance Image

slots:
  - id: subject_analysis
    label: Subject Analysis
    type: text
    cardinality: single
    summary_max_chars: 300

  - id: workflow_routing
    label: Workflow Routing
    type: text
    cardinality: single
    summary_max_chars: 200

  - id: material_images
    label: Reference Materials
    type: image
    cardinality: list
    ordered: true

  - id: material_summary
    label: Material Summary
    type: text
    cardinality: single
    summary_max_chars: 400

  - id: prompt_used
    label: Optimized Prompt
    type: text
    cardinality: single

  - id: enhanced_image_output
    label: Enhanced Images
    type: image
    cardinality: list
    ordered: true

  - id: image_output
    label: Raw Image
    type: image
    cardinality: single

ui:
  tabs:
    - id: analysis
      label: Analysis
      layout: list
      slots:
        - id: subject_analysis

    - id: materials
      label: Materials
      layout: grid
      slots:
        - id: material_images
        - id: material_summary

    - id: prompt
      label: Prompt
      layout: list
      slots:
        - id: prompt_used

    - id: result
      label: Result
      layout: horizontal
      slots:
        - id: image_output
        - id: enhanced_image_output

i18n:
  zh-CN:
    name: AI 图片生成
    steps:
      analyze_subject: {label: 主体分析}
      collect_materials: {label: 素材收集}
      optimize_prompt: {label: 提示词优化}
      generate_image: {label: 生成图片}
      enhance_image: {label: 图片增强}
    tabs:
      analysis: {label: 分析}
      materials: {label: 素材}
      prompt: {label: 提示词}
      result: {label: 结果}
    slots:
      subject_analysis: {label: 主体分析}
      material_images: {label: 参考素材}
      material_summary: {label: 材料摘要}
      prompt_used: {label: 优化后的提示词}
      enhanced_image_output: {label: 增强图片}
      image_output: {label: 原始图片}
