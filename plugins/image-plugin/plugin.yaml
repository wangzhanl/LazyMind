id: image-plugin
name: AI Image Generation
description: >
  Generate, find, or edit images from natural language descriptions.
  The workflow is dynamic: ChatAgent routes through analyze_subject,
  optimize_prompt, generate_image, collect_materials, and enhance_image
  based on user intent (CREATE_NEW vs FIND_AND_EDIT vs EDIT_UPLOAD).
  CREATE_NEW and KB_STYLE skip material collection and generate directly after
  prompt optimization. collect_materials gathers reference images for
  REFERENCE_GENERATE (then optimize → generate) or prepares a raw source image
  for FIND_AND_EDIT / EDIT_UPLOAD editing workflows.

when_to_use: >
  Trigger this plugin ONLY when the user's image request is COMPLEX and needs
  multi-step workflow support — e.g. knowledge-base style (kb_search), web/image
  search first then generate or edit, find-and-modify ("找一张XX再改成YY"),
  reference-based generation, uploaded-image editing with detailed instructions,
  or a rich multi-constraint description that benefits from analyze → collect →
  optimize → generate/enhance.
  Examples that SHOULD trigger: "根据知识库中的风格画一张产品图",
  "先搜几张赛博朋克参考图再画一张类似的", "找哈兰德照片然后加上王老吉字样",
  "启动绘图插件", "打开图片生成插件".
  Do NOT trigger for SIMPLE one-shot image requests. If the user uses casual
  short phrasing such as "直接", "给我", "随便画", "画个猫", "帮我生成一张图"
  without KB/search/edit/complex constraints, prefer the built-in
  image_generator / image_editor tools instead of this plugin.
  Do NOT trigger if image generation is merely one sub-step within a larger
  multi-step task (e.g. "write a report and add an image"). Do NOT trigger
  for text content, quizzes, reports, summaries, or any non-visual task.

tool_scripts:
  - path: scripts/tools.py
    functions:
      - image_search_tool
      - validate_image_ref

steps:
  - id: analyze_subject
    label: Analyze Subject

  - id: collect_materials
    label: Collect Materials

  - id: optimize_prompt
    label: Optimize Prompt

  - id: generate_image
    label: Generate Image

  - id: enhance_image
    label: Enhance Image

slots:
  - id: subject_analysis
    label: Subject Analysis
    type: text
    cardinality: single
    summary_max_chars: 300

  - id: workflow_routing
    label: Workflow Routing
    type: text
    cardinality: single
    summary_max_chars: 200

  - id: edit_route
    label: Edit Route Token
    type: text
    cardinality: single

  - id: material_images
    label: Reference Materials
    type: image
    cardinality: list
    ordered: true

  - id: material_summary
    label: Material Summary
    type: text
    cardinality: single
    summary_max_chars: 400

  - id: prompt_used
    label: Optimized Prompt
    type: text
    cardinality: single

  - id: enhanced_image_output
    label: Enhanced Images
    type: image
    cardinality: list
    ordered: true

  - id: raw_source_image
    label: Raw Source Image
    type: image
    cardinality: single

  - id: generated_image_output
    label: Generated Image
    type: image
    cardinality: single

ui:
  tabs:
    - id: analysis
      label: Analysis
      layout: list
      slots:
        - id: subject_analysis

    - id: materials
      label: Materials
      layout: grid
      slots:
        - id: material_images
        - id: material_summary
        - id: raw_source_image

    - id: prompt
      label: Prompt
      layout: list
      slots:
        - id: prompt_used

    - id: result
      label: Result
      layout: horizontal
      slots:
        - id: generated_image_output
        - id: enhanced_image_output

i18n:
  zh-CN:
    name: AI 图片生成
    steps:
      analyze_subject: {label: 主体分析}
      collect_materials: {label: 素材收集}
      optimize_prompt: {label: 提示词优化}
      generate_image: {label: 生成图片}
      enhance_image: {label: 图片增强}
    tabs:
      analysis: {label: 分析}
      materials: {label: 素材}
      prompt: {label: 提示词}
      result: {label: 结果}
    slots:
      subject_analysis: {label: 主体分析}
      material_images: {label: 参考素材}
      material_summary: {label: 材料摘要}
      prompt_used: {label: 优化后的提示词}
      enhanced_image_output: {label: 增强图片}
      image_output: {label: 原始图片}
