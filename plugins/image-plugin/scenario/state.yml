initial: __start__

# {{placeholder}} substitution rules (performed by Go before launching the SubAgent):
#
#   {{user_input}}           — the user's original request text
#   {{runtime_instruction}}  — ephemeral per-run instruction for retries
#   {{<artifact_id>}}        — value of an artifact saved by a prior step
#                              (text → text field; image → url field)

transitions:
  __start__:
    - to: analyze_subject
      condition: "Cold start — always enter subject analysis first."

  analyze_subject:
    - to: collect_materials
      condition: "Subject analysis complete — collect reference materials."
    - to: analyze_subject
      condition: "Analysis unsatisfactory — re-run subject analysis (full retry)."

  collect_materials:
    - to: optimize_prompt
      condition: "All materials collected — proceed to prompt optimization."
    - to: collect_materials
      condition: "Materials unsatisfactory — re-collect (full retry)."

  optimize_prompt:
    - to: generate_image
      condition: "Prompt ready — proceed to image generation."
    - to: optimize_prompt
      condition: "Prompt unsatisfactory — re-optimize (full retry)."

  generate_image:
    - to: enhance_image
      condition: "Raw image generated — proceed to enhancement."
    - to: generate_image
      condition: "Re-generate image with the same prompt (full retry)."
    - to: optimize_prompt
      condition: "User unhappy with image — rewind to prompt optimization."

  enhance_image:
    - to: __end__
      condition: "User satisfied — pipeline complete."
    - to: enhance_image
      condition: "Enhancement unsatisfactory — re-enhance (full retry)."
    - to: generate_image
      condition: "User unhappy with enhancement — re-generate raw image."

steps:
  analyze_subject:
    label: Analyze Subject
    prompt: |
      You are an expert art director and image analyst.

      The user wants to create an image with this description:
      {{user_input}}

      {{runtime_instruction}}

      Your task:
      1. Identify the main subject(s) and sub-topics that require reference materials.
         For example, if the user asks for "a painting featuring A, B, C, D",
         list each of A, B, C, D as an item to collect.
      2. Suggest a suitable artistic style (photorealistic, oil painting, anime, etc.).
      3. Note mood, lighting, and composition hints.
      4. Save the structured analysis:
           save_artifact(key='subject_analysis', content_type='text', value=<analysis text>)

      Keep the analysis concise (100–200 words). Stop after saving.
    outputs:
      - artifact_id: subject_analysis
        content_type: text
        slot_id: subject_analysis
    acceptance_criteria: |
      subject_analysis artifact must be saved and contain at least 50 words covering
      subjects/items to collect, artistic style, and mood/lighting hints.

  collect_materials:
    label: Collect Reference Materials
    # This step has a list-cardinality slot (material_images).
    #
    # Normal run: collect one image URL per subject item identified in subject_analysis.
    # Call save_artifact once per item (no sort_order needed — each call appends a new entry).
    #
    # Partial retry: if the user says "re-collect item B only", runtime_instruction will say
    # something like "Re-collect only item B; leave A, C, D untouched."
    # The system prompt will also contain a "Partial retry instruction" block that tells you
    # exactly which sort_order value(s) to pass to save_artifact for the affected item(s).
    # You MUST pass sort_order=N so that only the revision at display position N is replaced;
    # other positions are not touched.
    prompt: |
      You are a research agent that collects reference images for an art project.

      Subject analysis:
      {{subject_analysis}}

      {{runtime_instruction}}

      Your task:
      - Unless runtime_instruction restricts you to specific items, collect one reference
        image URL for each subject item identified in the analysis.
      - For each item, call image_search_tool to obtain image URLs, then immediately call:
          save_artifact(key='material_image', content_type='image', value=<url>)
        using the EXACT URL returned by image_search_tool. Never fabricate, substitute,
        or look up alternative URLs — always use what image_search_tool returns.
      - If the system prompt contains a "Partial retry instruction" block, follow it:
        pass sort_order=N for each item that should be overwritten. The sort_order value
        is the 1-based display position shown in brackets [N] in the artifact list above.
        Do NOT derive sort_order from params or any 0-based index — use only the values
        stated in the "Partial retry instruction" block.
      - Stop after all required items are saved.
    tools:
      - web_search_tool
      - image_search_tool
    inputs:
      - artifact_id: subject_analysis
        required: true
    outputs:
      - artifact_id: material_image
        content_type: image
        slot_id: material_images   # cardinality: list
    acceptance_criteria: |
      At least one material_image artifact must be saved with a valid http(s):// URL.

  optimize_prompt:
    label: Optimize Prompt
    prompt: |
      You are a professional image-generation prompt engineer.

      Subject analysis:
      {{subject_analysis}}

      Reference materials collected:
      {{material_image}}

      Original user request:
      {{user_input}}

      {{runtime_instruction}}

      Your task:
      1. Combine the analysis and material references into a high-quality English
         image-generation prompt (50–200 words, rich in visual detail).
      2. Include style modifiers, lighting, composition, and quality keywords.
      3. Save the result:
           save_artifact(key='optimized_prompt', content_type='text', value=<prompt>)

      Stop after saving. Do not output anything else.
    inputs:
      - artifact_id: subject_analysis
        required: true
      - artifact_id: material_image
        required: false
    outputs:
      - artifact_id: optimized_prompt
        content_type: text
        slot_id: prompt_used
    acceptance_criteria: |
      optimized_prompt artifact must be saved, in English, and contain at least 30 words.

  generate_image:
    label: Generate Image
    prompt: |
      You are an image generation agent.

      Use the following optimized prompt to generate an image:
      {{optimized_prompt}}

      {{runtime_instruction}}

      Steps:
      1. Call generate_image_tool(prompt=<optimized_prompt>) to create the image.
      2. Save the EXACT URL returned by generate_image_tool — do not fabricate or
         substitute any URL:
           save_artifact(key='generated_image_url', content_type='image', value=<url>)
      3. Stop after saving.
    tools:
      - generate_image_tool
    inputs:
      - artifact_id: optimized_prompt
        required: true
    outputs:
      - artifact_id: generated_image_url
        content_type: image
        slot_id: image_output
    acceptance_criteria: |
      generated_image_url artifact must be saved and contain a valid URL starting with http(s)://.

  enhance_image:
    label: Enhance Image
    # List-cardinality slot (enhanced_image_output). Each save_artifact call appends
    # a new enhanced version unless runtime_instruction / partial retry specifies
    # sort_order to overwrite a specific display position.
    prompt: |
      You are an image enhancement agent.

      Raw generated image URL:
      {{generated_image_url}}

      {{runtime_instruction}}

      Steps:
      1. Call enhance_image_tool(image_url=<generated_image_url>) to produce an enhanced version.
      2. Save the EXACT URL returned by enhance_image_tool — do not fabricate or
         substitute any URL:
           save_artifact(key='enhanced_image_url', content_type='image', value=<url>)
      3. Stop after saving.
    tools:
      - enhance_image_tool
    inputs:
      - artifact_id: generated_image_url
        required: true
    outputs:
      - artifact_id: enhanced_image_url
        content_type: image
        slot_id: enhanced_image_output
    acceptance_criteria: |
      enhanced_image_url artifact must be saved and contain a valid URL starting with http(s)://.
