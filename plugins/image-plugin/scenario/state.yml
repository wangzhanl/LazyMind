initial: __start__

# {{placeholder}} substitution rules (performed by Go before launching the SubAgent):
#
#   {{user_input}}           — the user's original request text
#   {{runtime_instruction}}  — ephemeral per-run instruction for retries
#   {{<slot>}}               — value of an artifact saved by a prior step
#                              (text → text field; image → url field)

transitions:
  __start__:
    - to: analyze_subject

  analyze_subject:
    - to: collect_materials

  collect_materials:
    - to: optimize_prompt

  optimize_prompt:
    - to: enhance_image
      when: 用户希望编辑已有图片
    - to: generate_image
      when: 用户希望生成一张新图片

  generate_image:
    - to: __end__

  enhance_image:
    - to: __end__

steps:
  analyze_subject:
    label: Analyze Subject
    prompt: |
      You are an expert art director and image analyst.

      The user wants to create or edit an image with this description:
      {{user_input}}

      {{runtime_instruction}}

      Your task:
      1. This step is ANALYSIS ONLY.
         Do NOT call any search tools, do NOT call kb_search, do NOT save any images.
         Do NOT save material_images, raw_source_image, prompt_used, or material_summary here.
      2. Identify the main subject(s) and sub-topics that require reference materials.
      3. Suggest a suitable artistic style (photorealistic, oil painting, anime, etc.).
      4. Note mood, lighting, and composition hints from the user text and any uploaded images.
      5. Classify the workflow internally (do NOT write routing fields into subject_analysis):
           - CREATE_NEW — brand-new image from scratch (text-to-image).
           - KB_STYLE — user wants style/content from a selected knowledge base as reference
             (e.g. "根据知识库中的风格画图"). KB retrieval will be done in collect_materials.
           - REFERENCE_GENERATE — user wants to search/collect reference images first, then
             generate a **new** image inspired by those refs (text-to-image, NOT editing the found photo).
           - FIND_AND_EDIT — user asks to find/search an existing photo online, then edit it.
           - EDIT_UPLOAD — user uploaded the source image for THIS edit request and wants to
             edit that upload directly (not search the web for a new photo).
      6. If the runtime instruction mentions a selected knowledge base, filters.kb_id is set,
         or the user explicitly references 知识库 / knowledge base style, prefer WORKFLOW: KB_STYLE.
      7. Save a **user-facing** analysis (shown in the Analysis tab):
           save_artifact(key='subject_analysis', content_type='text', value=<analysis text>)
         Write 100–200 words in clear natural language (Chinese if the user wrote in Chinese).
         Cover: subject, style, mood/lighting/composition, and what will happen next in plain words
         (e.g. "将先联网搜索参考图，再优化编辑指令并编辑图片").
         Do NOT include machine routing lines such as WORKFLOW:, NEXT_STEPS:, SKIP_STEPS:,
         or comma-separated step ids — those belong in workflow_routing only.
      8. Save **routing metadata** separately (for ChatAgent, not shown in the Analysis tab):
           save_artifact(key='workflow_routing', content_type='text', value=<routing block>)
         Use exactly this format (3 lines):
           WORKFLOW: <CREATE_NEW|KB_STYLE|REFERENCE_GENERATE|FIND_AND_EDIT|EDIT_UPLOAD>
           NEXT_STEPS: <comma-separated step ids>
           SKIP_STEPS: <comma-separated step ids or none>
         Routing table:
           KB_STYLE / CREATE_NEW / REFERENCE_GENERATE → NEXT_STEPS: collect_materials,optimize_prompt,generate_image
                                                       SKIP_STEPS: enhance_image
           FIND_AND_EDIT / EDIT_UPLOAD → NEXT_STEPS: collect_materials,optimize_prompt,enhance_image
                                        SKIP_STEPS: generate_image
         Do NOT save raw_source_image, prompt_used, material_images, or material_summary in this step.
      9. For FIND_AND_EDIT / EDIT_UPLOAD, save the material route token:
           save_artifact(key='edit_route', content_type='text', value='edit')
         For generation workflows, do not save edit_route; generation is the default branch.

      Stop after saving required artifacts only.
    outputs:
      - material: subject_analysis
        required: true
      - material: workflow_routing
        required: true
      - material: edit_route
        required: false
    acceptance_criteria: |
      subject_analysis must be saved (50+ words), user-facing natural language only —
      no WORKFLOW:/NEXT_STEPS:/SKIP_STEPS: lines or step-id lists.
      workflow_routing must be saved with WORKFLOW, NEXT_STEPS, and SKIP_STEPS lines.
      Do NOT call kb_search/web_search/image_search_tool in this step.
      Do NOT save material_images, raw_source_image, prompt_used, or material_summary in this step.

  collect_materials:
    label: Collect Reference Materials
    prompt: |
      You are a reference-material collection agent.

      Subject analysis:
      {{subject_analysis}}

      Workflow routing (internal):
      {{workflow_routing}}

      {{runtime_instruction}}

      Your task:
      0. Read WORKFLOW from workflow_routing (not from subject_analysis).
         - CREATE_NEW / KB_STYLE / REFERENCE_GENERATE: collect 1–3 reference images for prompt writing.
         - FIND_AND_EDIT / EDIT_UPLOAD: prepare source image(s) for image editing.
      - This is the ONLY step for external information/material collection.
      - You may use BOTH kb_search and web_search in this step.
      - For KB_STYLE (or when filters.kb_id is set), run kb_search first to collect style references.
      - For web collection, call web_search, then image_search_tool.
      - **Save only 1–3 validated images total** — stop as soon as you have enough.
      - If web_search is unavailable, fall back to wikipedia once, then continue.
      - If both web_search and wikipedia are unavailable, STOP with a failure note.
      - For web-sourced items, call image_search_tool, then validate candidates:
          1. Call validate_image_ref(url=<candidate>) — probe only, no full download
          2. If status is ok, save:
               save_artifact(key='material_images', content_type='image', value=<url>)
          3. If status is invalid, try the next candidate.
        **Hard limit: at most 3 material_images.** Do not save a 4th image.
        For FIND_AND_EDIT: 1 validated image is enough if it matches the subject; 2–3 only when
        the first candidates are poor fits.
      - For REFERENCE_GENERATE: save validated reference URLs as material_images only.
        Do NOT save raw_source_image or prompt_used — those belong in later generation steps.
      - If WORKFLOW is EDIT_UPLOAD, use find_user_attachment to get the uploaded source image.
        Save it as raw_source_image (the raw image entering image_editor). Do not web-search.
        Do NOT save prompt_used here — optimize_prompt will write the edit instruction.
      - If WORKFLOW is FIND_AND_EDIT, after validating and saving the best subject photo
        as material_images, also save the same validated URL as raw_source_image.
        Do NOT save prompt_used here — optimize_prompt will write the edit instruction.
      - Before stopping, write a concise Chinese summary (80–200 words) of what you collected:
          - what you searched for and key findings from web_search / wikipedia
          - how many material_images were saved and which one was chosen as raw_source_image (if any)
          - why that image fits the user's request, or note gaps (e.g. no jersey photo found)
          save_artifact(key='material_summary', content_type='text', value=<summary>)
      - Follow any "Partial retry instruction" block for sort_order on list slots.
      - Stop after all required artifacts are saved.
    tools:
      - kb
      - multimodal
      - web_search
      - wikipedia
      - image_search_tool
      - validate_image_ref
    inputs:
      - material: subject_analysis
        required: true
      - material: workflow_routing
        required: true
    outputs:
      - material: material_images
        required: false
      - material: material_summary
        required: true
      - material: raw_source_image
        required: false
    acceptance_criteria: |
      For CREATE_NEW / KB_STYLE / REFERENCE_GENERATE: 1–3 validated material_images should be saved (never more than 3).
      For FIND_AND_EDIT: 1–3 material_images and one raw_source_image must be saved (never more than 3 images).
      For EDIT_UPLOAD: raw_source_image must be saved from the user upload.
      material_summary should be saved with a concise description of search results and image selection.
      optimize_prompt writes prompt_used in the next step.

  optimize_prompt:
    label: Optimize Prompt
    route: choice
    prompt: |
      You are a professional image prompt engineer for both text-to-image and image editing.

      Subject analysis:
      {{subject_analysis}}

      Workflow routing (internal):
      {{workflow_routing}}

      Optional reference materials:
      {{material_images}}

      Source image for editing (if already collected):
      {{raw_source_image}}

      Original user request:
      {{user_input}}

      {{runtime_instruction}}

      Your task:
      1. Read WORKFLOW from workflow_routing (not from subject_analysis).
      2. For CREATE_NEW, KB_STYLE, or REFERENCE_GENERATE:
         Combine subject_analysis and any optional material images into a high-quality
         English image-generation prompt (50–200 words, rich in visual detail).
         Include style modifiers, lighting, composition, and quality keywords.
      3. For FIND_AND_EDIT or EDIT_UPLOAD (when raw_source_image is available):
         Write a concise English **edit instruction** for image_editor (not a generation prompt).
         Focus on what to change while keeping the rest of the photo realistic and unchanged.
      4. When subject_analysis includes KB text findings, mirror their color palette,
         composition, and artistic style. Use material_images only as an optional reference.
      5. Save the result:
           save_artifact(key='prompt_used', content_type='text', value=<prompt or edit instruction>)

      Stop after saving. Do not output anything else.
    inputs:
      - material: subject_analysis
        required: true
      - material: workflow_routing
        required: true
      - material: material_images
        required: false
      - material: raw_source_image
        required: false
    outputs:
      - material: prompt_used
    acceptance_criteria: |
      prompt_used artifact must be saved in English.
      For generation workflows: at least 30 words, suitable for image_generator.
      For edit workflows (FIND_AND_EDIT / EDIT_UPLOAD): a clear edit instruction for image_editor.

  generate_image:
    label: Generate Image
    prompt: |
      You are an image generation agent.

      Use the following optimized prompt to generate an image:
      {{prompt_used}}

      {{runtime_instruction}}

      Steps:
      1. Call image_generator exactly ONCE with:
           prompt=<prompt_used>, image_size='1024x1024', batch_size=1.
      2. If the tool call fails, STOP immediately with a concise failure note.
      3. Take `local_path` (preferred) or `image_url` — do NOT fabricate paths.
      4. Save:
           save_artifact(key='generated_image_output', content_type='image',
                         value=<local_path or image_url>, source_tool='image_generator')
      5. Final text image links MUST start with `/static-files/` if present.
      6. Stop after saving.
    tools:
      - image_generator
    inputs:
      - material: prompt_used
        required: true
    outputs:
      - material: generated_image_output
    acceptance_criteria: |
      generated_image_output artifact must be saved with a valid local path or http(s) URL.

  enhance_image:
    label: Enhance Image
    prompt: |
      You are an image enhancement / editing agent.

      Raw image (if already saved):
      {{raw_source_image}}

      Reference materials (fallback source):
      {{material_images}}

      Original user request:
      {{user_input}}

      Edit / style instruction:
      {{prompt_used}}

      {{runtime_instruction}}

      Your task:
      1. Resolve the source image (the **original photo**, not an AI-generated image):
         - Prefer raw_source_image if present (should be the raw photo from collect_materials).
         - Else call get_artifact(key='material_images') and use the best subject photo.
         - Else use find_user_attachment for user uploads.
         - If validation is uncertain, call validate_image_ref first.
      2. Call validate_image_ref if not already validated. Proceed only when status is ok.
      3. Call image_editor (NOT image_generator) with:
           prompt=<edit instruction from prompt_used and user_input>
           urls=[<url from validate_image_ref or validated artifact>]
      4. Take `local_path` (preferred) or `image_url` from the tool result.
      5. Save the **edited** image ONLY here:
           save_artifact(key='enhanced_image_output', content_type='image',
                         value=<local_path or image_url>, source_tool='image_editor')
         Do NOT call save_artifact(key='raw_source_image', ...) in this step — that slot
         must keep the original raw photo from collect_materials.
         For partial retry, pass sort_order=N per the "Partial retry instruction" block.
      6. Final text image links MUST start with `/static-files/` if present.
      7. Stop after saving.
    tools:
      - image_editor
      - multimodal
      - validate_image_ref
    inputs:
      - material: raw_source_image
        required: false
      - material: material_images
        required: false
      - material: prompt_used
        required: false
    outputs:
      - material: enhanced_image_output
    acceptance_criteria: |
      enhanced_image_output artifact must be saved with a valid local path or http(s) URL.
