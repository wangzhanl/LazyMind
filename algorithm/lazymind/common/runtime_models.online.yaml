# Runtime model config for online/cloud deployment using Minimax.
# All model roles are statically configured; API key is read from the environment.
# yaml key = AutoModel(model=...) lookup name; name field = actual model name sent to the API.

llm:
  - source: qwen
    name: qwen3-max

evo_llm:
  - source: qwen
    name: qwen3-max

reranker:
  - source: qwen
    name: gte-rerank-v2

embed_main:
  - source: qwen
    type: embed
    name: text-embedding-v3

# Cross-modal (image) embed; used by image nodes and image-only retrieval branch.
embed_image:
  - source: qwen
    type: cross_modal_embed
    name: qwen2.5-vl-embedding

# Vision-language model for image-aware query rewriting and vision_extractor tool.
vlm:
  - source: qwen
    type: vlm
    name: qwen-vl-plus

speech_to_text:
  - source: siliconflow
    type: stt
    name: FunAudioLLM/SenseVoiceSmall

video_generator:
  - source: doubao
    type: text2video
    name: doubao-seedance-1-0-pro-fast-251015
    api_key: ${LAZYLLM_DOUBAO_API_KEY}
