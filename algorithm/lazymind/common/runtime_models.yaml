# Runtime model roles for LazyMind (online/cloud deployment).
# Chat/rerank/embed roles use source=dynamic: model config is injected per-request via globals.config.

llm:
  source: dynamic
  dynamic_auth: true
  type: llm

evo_llm:
  source: dynamic
  dynamic_auth: true
  type: llm

reranker:
  source: dynamic
  dynamic_auth: true
  type: rerank

embed_main:
  source: dynamic
  dynamic_auth: true
  type: embed

# Cross-modal (image) embed; used by image nodes and image-only retrieval branch.
# When configured via the model provider UI, source=dynamic overrides the static entry below.
embed_image:
  source: dynamic
  dynamic_auth: true
  type: cross_modal_embed

vlm:
  source: dynamic
  dynamic_auth: true
  type: vlm

speech_to_text:
  source: dynamic
  dynamic_auth: true
  type: stt

image_generator:
  source: dynamic
  dynamic_auth: true
  type: text2image

image_editor:
  source: dynamic
  dynamic_auth: true
  type: image_editing

video_generator:
  source: dynamic
  dynamic_auth: true
  type: text2video
