_format_version: "3.0"

# Route order: more specific paths first so /api/chat is not swallowed by /api
services:
  - name: auth-service
    url: http://auth-service:8000
    routes:
      - name: authservice-route
        paths:
          - /api/authservice
        strip_path: false
        plugins:
          - name: rbac-auth
            config:
              auth_service_url: http://auth-service:8000

  - name: chat-service
    url: http://chat:8046
    routes:
      - name: chat-route
        paths:
          - /api/chat
        strip_path: false
        plugins:
          - name: rbac-auth
            config:
              auth_service_url: http://auth-service:8000

  - name: scan-control-plane
    url: http://scan-control-plane:18080
    routes:
      - name: scan-route
        paths:
          - /api/scan
        strip_path: false
        plugins:
          - name: rbac-auth
            config:
              auth_service_url: http://auth-service:8000

  # core 统一通过 /api/core 访问，Kong  strip 前缀后转发（如 /api/core/conversations → /conversations）
  - name: core-service
    url: http://core:8000
    connect_timeout: 180000
    read_timeout: 600000
    write_timeout: 600000
    routes:
      - name: core-route
        paths:
          - /api/core
        strip_path: true
        plugins:
          - name: rbac-auth
            config:
              auth_service_url: http://auth-service:8000

  - name: evo-service
    url: http://evo-api:8047
    routes:
      - name: evo-router-internal-only
        paths:
          - "~/api/evo/router(?:/|%2[fF]|$)"
        strip_path: false
        plugins:
          - name: request-termination
            config:
              status_code: 404
      - name: evo-route
        paths:
          - /api/evo
        strip_path: true
        plugins:
          - name: rbac-auth
            config:
              auth_service_url: http://auth-service:8000
